"], "areaDesc": "Northern Outer Banks; Hatteras Island", "category": "Marine/Beach", "certainty": "Likely", "code": "IPAWSv1.0", "description": "* WHAT...Dangerous rip currents and strong longshore currents in\nthe surf zone.\n\n* WHERE...The beaches north of Cape Hatteras.\n\n* WHEN...Until 8 PM EDT this evening.\n\n* IMPACTS...Rip currents can sweep even the best swimmers away\nfrom shore into deeper water. Strong longshore currents will\ncreate dangerous swimming conditions.\n\n* ADDITIONAL DETAILS...The most likely time for strong rip\ncurrents to occur is a couple hours either side of low tide,\nwhich will occur around 2 PM this afternoon.", "effective": "2026-05-02T10:26:00-04:00", "ends": "2026-05-02T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-05-02T20:00:00-04:00", "geocode": {"SAME": ["037055"], "UGC": ["NCZ203", "NCZ205"]}, "headline": "Beach Hazards Statement issued May 2 at 10:26AM EDT until May 2 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.fbbe03eae6e39d47b0711eb3274cba99015c9068.001.1", "instruction": "Life-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Update", "note": null, "onset": "2026-05-02T10:26:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT UNTIL 8 PM EDT THIS EVENING"], "VTEC": ["/O.CON.KMHX.BH.S.0017. ng rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Update", "note": null, "onset": "2026-05-02T10:26:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT UNTIL 8 PM EDT THIS EVENING"], "VTEC": ["/O.CON.KMHX.BH.S.0017.000000T0000Z-260503T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 021426"], "eventEndingTime": ["2026-05-02T20:00:00-04:00"], "expiredReferences": ["w-nws.webmaster@noaa.gov,urn:oid:2.49.0.1.840.0.124609793e7ec195ae4affca8e65d7ffd57cbd45.001.2,2026-05-01T20:06:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.ff0ab6a549bcc67a5bbf44484371322a545b42ce.001.1", "identifier": "urn:oid:2.49.0.1.840.0.ff0ab6a549bcc67a5bbf44484371322a545b42ce.001.1", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-05-02T02:31:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-05-02T10:26:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-77.948509, 33.928558, -77.724065, 34.313668], "geometry": {"geometries": [{"coordinates": [[[[-77.935265, 33.993122], [-77.937347, 33.991657], [-77.939713, 33.991459], [-77.935776, 34.007278], [-77.932648, 34.008446], [-77.929459, 34.00666], [-77.926926, 34.002426], [-77.930199, 34.000507], [-77.933342, 33.99704], [-77
