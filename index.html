dvisory, large breaking waves of 6 to 8 feet expected in\nthe surf zone.\n\n* WHERE...Northern Outer Banks beaches.\n\n* WHEN...For the Beach Hazards Statement, from 8 AM EDT this\nmorning through this evening. For the High Surf Advisory, from\nnoon today to 11 AM EDT Thursday.\n\n* IMPACTS...Dangerous swimming and surfing conditions and\nlocalized beach erosion. Rip currents can sweep even the best\nswimmers away from shore into deeper water. Dangerous shore\nbreak can throw a swimmer or surfer head first into the bottom\ncausing neck and back injuries.\n\n* ADDITIONAL DETAILS...High surf and dangerous rip currents may\nlinger beyond Thursday morning. The most likely time for strong\nrip currents to occur is a couple of hours either side of low\ntide, which will occur around 6:30 AM and 6:30 PM.", "effective": "2026-04-08T04:21:00-04:00", "ends": "2026-04-08T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-04-08T16:30:00-04:00", "geocode": {"SAME": ["037055"], "UGC": ["NCZ203"]}, "headline": "Beach Hazards Statement issued April 8 at 4:21AM EDT until April 8 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.fbec0c7d1b0fa98eda7f80610ddad170c5b89fa7.001.2", "instruction": "Inexperienced swimmers should remain out of the water due to\ndangerous surf conditions.\n\nLife-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.", "language": "en-US", "messageType": "Update", "onset": "2026-04-08T08:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": [ t/NCZ205"], "areaDesc": "Hatteras Island", "category": "Marine/Beach", "certainty": "Likely", "code": "IPAWSv1.0", "description": "* WHAT...For the Beach Hazards Statement, dangerous rip currents\nand large breaking waves expected near the shore. For the High\nSurf Advisory, large breaking waves of 5 to 8 feet expected in\nthe surf zone.\n\n* WHERE...For the high rip current threat and shorebreak hazard,\nall Hatteras Island beaches. For the longshore current hazard,\nbeaches south of Cape Hatteras.\n\n* WHEN...For the Beach Hazards Statement, from 8 AM EDT this\nmorning through this evening. For the High Surf Advisory, from\nnoon today to 11 AM EDT Thursday.\n\n* IMPACTS...Dangerous swimming and surfing conditions and\nlocalized beach erosion. Rip currents can sweep even the best\nswimmers away from shore into deeper water. Dangerous shore\nbreak can throw a swimmer or surfer head first into the bottom\ncausing neck and back injuries.\n\n* ADDITIONAL DETAILS...High surf and dangerous rip currents may\nlinger beyond Thursday morning. The most likely time for strong\nrip currents to occur is a couple of hours either side of low\ntide, which will occur around 6:30 AM and 6:30 PM.", "effective": "2026-04-08T04:21:00-04:00", "ends": "2026-04-08T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-04-08T16:30:00-04:00", "geocode": {"SAME": ["037055"], "UGC": ["NCZ205"]}, "headline": "Beach Hazards Statement issued April 8 at 4:21AM EDT until April 8 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.fbec0c7d1b0fa98eda7f80610ddad170c5b89fa7.002.2", "instruction": "Inexperienced swimmers should remain out of the water due to\ndangerous surf conditions.\n\nLife-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.", "language": "en-US", "messageType": "Update", "onset": "2026-04-08T08:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT FROM 8 AM EDT THIS MORNING THROUGH THIS EVENING... ...HIGH SURF ADVISORY REMAINS IN EFFECT FROM NOON TODAY TO 11 AM EDT THURSDAY"], "VTEC": ["/O.CON.KMHX.BH.S.0002.260408T1200Z-260409T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 080821"], "eventEndingTime": ["2026-04-08T20:00:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.001.2", "identifier": "urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.001.2", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-04-07T20:08:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-04-08T04:21:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-76.691153, 34.581571, -76.018619, 35.106266], "geometry": {"coordinates": [[[[-76.5277634, 34.6338585], [-76.52912, 34.63418], [-76.5299759, 34.6350975], [-76.5283737, 34.6360359], [-76.5277634, 34.6338585]]], [[[-76.522386, 34.635827], [-76.5240234, 34.634362], [-76.525213, 34.6348893], [-76.524021, 34.63608], [-76.522386, 34.635827]]], [[[-76.5242423, 34.6372016], [-76.527069, 34.6345], [-76.5282593, 34.6365395], [-76.5302273, 34.6355782], [-76.5316925, 34.6376839], [-76.5297241, 34.637867], [-76.5303918, 34.6407521], [-76.5288696, 34.6418266], [-76.525655, 34.637019], [-76.5272598, 34.6423073], [-76.524103, 34.639331], [-76.5242423, 34.6372016]]], i.weather.gov/zones/forecast/NCZ204"], "areaDesc": "East Carteret; Ocracoke Island", "category": "Marine/Beach", "certainty": "Likely", "code": "IPAWSv1.0", "description": "* WHAT...For the Beach Hazards Statement, dangerous rip currents,\nlarge breaking waves expected, and strong longshore currents\nnear the shore. For the High Surf Advisory, large breaking\nwaves of 3 to 8 feet expected in the surf zone.\n\n* WHERE...Ocracoke Island and Core Banks beaches.\n\n* WHEN...For the Beach Hazards Statement, from 8 AM EDT this\nmorning through this evening. For the High Surf Advisory, from\nnoon today to 11 AM EDT Thursday.\n\n* IMPACTS...Dangerous swimming and surfing conditions and\nlocalized beach erosion. Rip currents can sweep even the best\nswimmers away from shore into deeper water. Dangerous shore\nbreak can throw a swimmer or surfer head first into the bottom\ncausing neck and back injuries. Strong longshore currents will\ncreate dangerous swimming conditions.\n\n* ADDITIONAL DETAILS...High surf and dangerous rip currents may\nlinger beyond Thursday morning. The most likely time for strong\nrip currents to occur is a couple of hours either side of low\ntide, which will occur around 6:30 AM and 6:30 PM.", "effective": "2026-04-08T04:21:00-04:00", "ends": "2026-04-08T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-04-08T16:30:00-04:00", "geocode": {"SAME": ["037031", "037095"], "UGC": ["NCZ196", "NCZ204"]}, "headline": "Beach Hazards Statement issued April 8 at 4:21AM EDT until April 8 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.fbec0c7d1b0fa98eda7f80610ddad170c5b89fa7.003.2", "instruction": "Inexperienced swimmers should remain out of the water due to\ndangerous surf conditions.\n\nLife-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Update", "onset": "2026-04-08T08:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT FROM 8 AM EDT THIS MORNING THROUGH THIS EVENING NORTH OF CAPE LOOKOUT... ...HIGH SURF ADVISORY REMAINS IN EFFECT FROM NOON TODAY TO 11 AM EDT THURSDAY NORTH OF CAPE LOOKOUT"], "VTEC": ["/O.CON.KMHX.BH.S.0002.260408T1200Z-260409T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 080821"], "eventEndingTime": ["2026-04-08T20:00:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.002.1", "identifier": "urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.002.1", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-04-07T20:08:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-04-08T04:21:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-76.014183, 35.065948, -75.7640673, 35.1957659], "geometry": {"coordinates": [[[[-75.8181078, 35.1725288], [-75.818527, 35.172413], [-75.820755, 35.173214], [-75.8181915, 35.1738777], [-75.8181078, 35.1725288]]], [[[-75.805416, 35.183956], [-75.80748, 35.1843], [-75.8076477, 35. ther.gov/alerts/urn:oid:2.49.0.1.840.0.fbec0c7d1b0fa98eda7f80610ddad170c5b89fa7.002.1", "@type": "wx:Alert", "affectedZones": ["https://api.weather.gov/zones/forecast/NCZ205"], "areaDesc": "Hatteras Island", "category": "Marine/Beach", "certainty": "Likely", "code": "IPAWSv1.0", "description": "* WHAT...For the Beach Hazards Statement, dangerous rip currents\nand large breaking waves expected near the shore. For the High\nSurf Advisory, large breaking waves of 5 to 8 feet expected in\nthe surf zone.\n\n* WHERE...For the high rip current threat and shorebreak hazard,\nall Hatteras Island beaches. For the longshore current hazard,\nbeaches south of Cape Hatteras.\n\n* WHEN...For the Beach Hazards Statement, from 8 AM EDT this\nmorning through this evening. For the High Surf Advisory, from\nnoon today to 11 AM EDT Thursday.\n\n* IMPACTS...Dangerous swimming and surfing conditions and\nlocalized beach erosion. Rip currents can sweep even the best\nswimmers away from shore into deeper water. Dangerous shore\nbreak can throw a swimmer or surfer head first into the bottom\ncausing neck and back injuries.\n\n* ADDITIONAL DETAILS...High surf and dangerous rip currents may\nlinger beyond Thursday morning. The most likely time for strong\nrip currents to occur is a couple of hours either side of low\ntide, which will occur around 6:30 AM and 6:30 PM.", "effective": "2026-04-08T04:21:00-04:00", "ends": "2026-04-09T11:00:00-04:00", "event": "High Surf Advisory", "eventCode": {"NationalWeatherService": ["SUY"], "SAME": ["NWS"]}, "expires": "2026-04-08T16:30:00-04:00", "geocode": {"SAME": ["037055"], "UGC": ["NCZ205"]}, "headline": "High Surf Advisory issued April 8 at 4:21AM EDT until April 9 at 11:00AM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.fbec0c7d1b0fa98eda7f80610ddad170c5b89fa7.002.1", "instruction": "Inexperienced swimmers should remain out of the water due to\ndangerous surf conditions.\n\nLife-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.", "language": "en-US", "messageType": "Update", "onset": "2026-04-08T12:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT FROM 8 AM EDT THIS MORNING THROUGH THIS EVENING... ...HIGH SURF ADVISORY REMAINS IN EFFECT FROM NOON TODAY TO 11 AM EDT THURSDAY"], "VTEC": ["/O.CON.KMHX.SU.Y.0004.260408T1600Z-260409T1500Z/"], "WMOidentifier": ["WHUS42 KMHX 080821"], "eventEndingTime": ["2026-04-09T11:00:00-04:00"], "expiredReferences": ["w-nws.webmaster@noaa.gov,urn:oid:2.49.0.1.840.0.c8c96c2e169dea91607533b1a2d100472937119b.001.1,2026-04-07T15:07:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.001.3", "identifier": "urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.001.3", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-04-07T20:08:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-04-08T04:21:00-04:00", "severity": "Minor", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-76.691153, 34.581571, -76.018619, 35.106266], "geometry": {"coordinates": [[[[-76.5277634, 34.6338585], [-76.52912, 34.63418], [-76.5299759, 34.6350975], [-76.5283737, 34.6360359], [-76.5277634, 34.6338585]]], [[[-76.522386, 34.635827], [-76.5240234, 34.634362], [-76.525213, 34.6348893], [-76.524021, 34.63608], [-76.522386, 34.635827]]], [[[-76.5242423, 34 106266], [-76.0684521, 35.1055804]]]], "type": "MultiPolygon"}, "id": "15", "properties": {"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.fbec0c7d1b0fa98eda7f80610ddad170c5b89fa7.003.1", "@type": "wx:Alert", "affectedZones": ["https://api.weather.gov/zones/forecast/NCZ196", "https://api.weather.gov/zones/forecast/NCZ204"], "areaDesc": "East Carteret; Ocracoke Island", "category": "Marine/Beach", "certainty": "Likely", "code": "IPAWSv1.0", "description": "* WHAT...For the Beach Hazards Statement, dangerous rip currents,\nlarge breaking waves expected, and strong longshore currents\nnear the shore. For the High Surf Advisory, large breaking\nwaves of 3 to 8 feet expected in the surf zone.\n\n* WHERE...Ocracoke Island and Core Banks beaches.\n\n* WHEN...For the Beach Hazards Statement, from 8 AM EDT this\nmorning through this evening. For the High Surf Advisory, from\nnoon today to 11 AM EDT Thursday.\n\n* IMPACTS...Dangerous swimming and surfing conditions and\nlocalized beach erosion. Rip currents can sweep even the best\nswimmers away from shore into deeper water. Dangerous shore\nbreak can throw a swimmer or surfer head first into the bottom\ncausing neck and back injuries. Strong longshore currents will\ncreate dangerous swimming conditions.\n\n* ADDITIONAL DETAILS...High surf and dangerous rip currents may\nlinger beyond Thursday morning. The most likely time for strong\nrip currents to occur is a couple of hours either side of low\ntide, which will occur around 6:30 AM and 6:30 PM.", "effective": "2026-04-08T04:21:00-04:00", "ends": "2026-04-09T11:00:00-04:00", "event": "High Surf Advisory", "eventCode": {"NationalWeatherService": ["SUY"], "SAME": ["NWS"]}, "expires": "2026-04-08T16:30:00-04:00", "geocode": {"SAME": ["037031", "037095"], "UGC": ["NCZ196", "NCZ204"]}, "headline": "High Surf Advisory issued April 8 at 4:21AM EDT until April 9 at 11:00AM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.fbec0c7d1b0fa98eda7f80610ddad170c5b89fa7.003.1", "instruction": "Inexperienced swimmers should remain out of the water due to\ndangerous surf conditions.\n\nLife-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Update", "onset": "2026-04-08T12:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT FROM 8 AM EDT THIS MORNING THROUGH THIS EVENING NORTH OF CAPE LOOKOUT... ...HIGH SURF ADVISORY REMAINS IN EFFECT FROM NOON TODAY TO 11 AM EDT THURSDAY NORTH OF CAPE LOOKOUT"], "VTEC": ["/O.CON.KMHX.SU.Y.0004.260408T1600Z-260409T1500Z/"], "WMOidentifier": ["WHUS42 KMHX 080821"], "eventEndingTime": ["2026-04-09T11:00:00-04:00"], "expiredReferences": ["w-nws.webmaster@noaa.gov,urn:oid:2.49.0.1.840.0.c8c96c2e169dea91607533b1a2d100472937119b.002.1,2026-04-07T15:07:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.002.2", "identifier": "urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.002.2", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-04-07T20:08:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": nts\nnear the shore. For the High Surf Advisory, large breaking\nwaves of 3 to 8 feet expected in the surf zone.\n\n* WHERE...Ocracoke Island and Core Banks beaches.\n\n* WHEN...For the Beach Hazards Statement, from 8 AM EDT this\nmorning through this evening. For the High Surf Advisory, from\nnoon today to 11 AM EDT Thursday.\n\n* IMPACTS...Dangerous swimming and surfing conditions and\nlocalized beach erosion. Rip currents can sweep even the best\nswimmers away from shore into deeper water. Dangerous shore\nbreak can throw a swimmer or surfer head first into the bottom\ncausing neck and back injuries. Strong longshore currents will\ncreate dangerous swimming conditions.\n\n* ADDITIONAL DETAILS...High surf and dangerous rip currents may\nlinger beyond Thursday morning. The most likely time for strong\nrip currents to occur is a couple of hours either side of low\ntide, which will occur around 6:30 AM and 6:30 PM.", "effective": "2026-04-08T04:21:00-04:00", "ends": "2026-04-09T11:00:00-04:00", "event": "High Surf Advisory", "eventCode": {"NationalWeatherService": ["SUY"], "SAME": ["NWS"]}, "expires": "2026-04-08T16:30:00-04:00", "geocode": {"SAME": ["037031", "037095"], "UGC": ["NCZ196", "NCZ204"]}, "headline": "High Surf Advisory issued April 8 at 4:21AM EDT until April 9 at 11:00AM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.fbec0c7d1b0fa98eda7f80610ddad170c5b89fa7.003.1", "instruction": "Inexperienced swimmers should remain out of the water due to\ndangerous surf conditions.\n\nLife-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Update", "onset": "2026-04-08T12:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT FROM 8 AM EDT THIS MORNING THROUGH THIS EVENING NORTH OF CAPE LOOKOUT... ...HIGH SURF ADVISORY REMAINS IN EFFECT FROM NOON TODAY TO 11 AM EDT THURSDAY NORTH OF CAPE LOOKOUT"], "VTEC": ["/O.CON.KMHX.SU.Y.0004.260408T1600Z-260409T1500Z/"], "WMOidentifier": ["WHUS42 KMHX 080821"], "eventEndingTime": ["2026-04-09T11:00:00-04:00"], "expiredReferences": ["w-nws.webmaster@noaa.gov,urn:oid:2.49.0.1.840.0.c8c96c2e169dea91607533b1a2d100472937119b.002.1,2026-04-07T15:07:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.002.2", "identifier": "urn:oid:2.49.0.1.840.0.2737d9b20553acff91fd5ca3046d6c264817d6a6.002.2", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-04-07T20:08:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-04-08T04:21:00-04:00", "severity": "Minor", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-75.8027688, 35.7608185, -75.5343631, 36.2315019], "geometry": {"coordinates": [[[[-75.5921097, 35.7608185], [-75.5932888, 35.7626492], [-75.5912937, 35.7630845], [-75.5913773, 35.7618065], [-75.5921097, 35.7608185]]], [[[-75.5887091, 35.764574], [-75.5900273, 35.7635197], [-75.5914917, 35.7653503], [-75.5871369, 35.7690165], [-75.5887091, 35.764574]]], [[[-75.5854263, 35.7708282], [-75.5869129, 35.7713993], [-75.5865761, 35.772338], [-7
