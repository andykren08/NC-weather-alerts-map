0:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-06-19T16:00:00-04:00", "geocode": {"SAME": ["037031", "037133", "037095", "037055"], "UGC": ["NCZ195", "NCZ196", "NCZ199", "NCZ204", "NCZ205"]}, "headline": "Beach Hazards Statement issued June 19 at 3:53AM EDT until June 19 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.e085345aabec311a54b62ce4229d7ee924a9c84a.001.1", "instruction": "Life-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Update", "note": null, "onset": "2026-06-19T08:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT FROM 8 AM EDT THIS MORNING THROUGH THIS EVENING"], "VTEC": ["/O.CON.KMHX.BH.S.0038.260619T1200Z-260620T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 190753"], "eventEndingTime": ["2026-06-19T20:00:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.bf1d4663055233df93c26ffa6fbc15d2b3a43ed6.001.2", "identifier": "urn:oid:2.49.0.1.840.0.bf1d4663055233df93c26ffa6fbc15d2b3a43ed6.001.2", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-06-18T20:12:00-04:00"}], "response": "A urrents, large breaking waves,\nand strong longshore currents, the beaches from Cape Hatteras\nto Surf City. For the strong longshore currents, the beaches\nfrom Oregon Inlet to Cape Hatteras.\n\n* WHEN...From 8 AM EDT Friday through Friday evening.\n\n* IMPACTS...Rip currents can sweep even the best swimmers away\nfrom shore into deeper water. Dangerous shore break can throw\na swimmer or surfer head first into the bottom causing neck\nand back injuries. Strong longshore currents will create\ndangerous swimming conditions.\n\n* ADDITIONAL DETAILS...The most likely time for strong rip\ncurrents to occur is a couple hours either side of low tide,\nwhich will occur around 5:00 PM Friday.", "effective": "2026-06-19T03:53:00-04:00", "ends": "2026-06-19T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-06-19T16:00:00-04:00", "geocode": {"SAME": ["037031", "037133", "037095", "037055"], "UGC": ["NCZ195", "NCZ196", "NCZ199", "NCZ204", "NCZ205"]}, "headline": "Beach Hazards Statement issued June 19 at 3:53AM EDT until June 19 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.e085345aabec311a54b62ce4229d7ee924a9c84a.001.1", "instruction": "Life-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Update", "note": null, "onset": "2026-06-19T08:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT FROM 8 AM EDT THIS MORNING THROUGH THIS EVENING"], "VTEC": ["/O.CON.KMHX.BH.S.0038.260619T1200Z-260620T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 190753"], "eventEndingTime": ["2026-06-19T20:00:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.bf1d4663055233df93c26ffa6fbc15d2b3a43ed6.001.2", "identifier": "urn:oid:2.49.0.1.840.0.bf1d4663055233df93c26ffa6fbc15d2b3a43ed6.001.2", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-06-18T20:12:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-06-19T03:53:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-77.576195, 34.440409, -77.098419, 34.784729], "geometry": {"coordinates": [[[[-77.507866, 34.450974], [-77.508141, 34.450676], [-77.508527, 34.450676], [-77.507865, 34.451614], [-77.507866, 34.450974]]], [[[-77.527924, 34.457298], [-77.528778, 34.45755], [-77.528615, 34.45787], [-77.528007, 34.45787], [-77.527924, 34.457298]]], [[[-77.532013, 34.45787], [-77.5308, 34.457779], [-77.530549, 34.457413], [-77.531876, 34.456864], [-77.532013, 34.45787]]], [[[-77.525436, 34.458855], [-77.525771, 34.458763], [-77.526236, 34.45897], [-77.525652, 34.459194], [-77.525436, 34.458855]]], [[[-77.50352, 34.459464], [-77.50396, 34.459488], [-77.503381, 34.460014], [-77.503273, 34.459808], [-77.50352, 34.459464]]], [[[-77.517975, 34.460751], [-77.518196, 34.459951], [-77.518582, 34.459974], [-77.518303, 34.460888], [-77.517975, 34.460751]]], [[[-77.516815, 34.4613], [-77.517283, 34.461095], [-77.517639, 34.46146], [-77.516838, 34.461781], [-77.516815, 34.4613]]],  "areaDesc": "West Carteret; East Carteret; Coastal Onslow; Ocracoke Island; Hatteras Island", "category": "Marine/Beach", "certainty": "Likely", "code": "IPAWSv1.0", "description": "* WHAT...Dangerous rip currents, large breaking waves expected,\nand strong longshore currents in the surf zone.\n\n* WHERE...For the dangerous rip currents, large breaking waves,\nand strong longshore currents, the beaches from Cape Hatteras\nto Surf City. For the strong longshore currents, the beaches\nfrom Oregon Inlet to Cape Hatteras.\n\n* WHEN...From 8 AM EDT Friday through Friday evening.\n\n* IMPACTS...Rip currents can sweep even the best swimmers away\nfrom shore into deeper water. Dangerous shore break can throw\na swimmer or surfer head first into the bottom causing neck\nand back injuries. Strong longshore currents will create\ndangerous swimming conditions.\n\n* ADDITIONAL DETAILS...The most likely time for strong rip\ncurrents to occur is a couple hours either side of low tide,\nwhich will occur around 5:00 PM Friday.", "effective": "2026-06-19T03:53:00-04:00", "ends": "2026-06-19T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-06-19T16:00:00-04:00", "geocode": {"SAME": ["037031", "037133", "037095", "037055"], "UGC": ["NCZ195", "NCZ196", "NCZ199", "NCZ204", "NCZ205"]}, "headline": "Beach Hazards Statement issued June 19 at 3:53AM EDT until June 19 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.e085345aabec311a54b62ce4229d7ee924a9c84a.001.1", "instruction": "Life-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Update", "note": null, "onset": "2026-06-19T08:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT FROM 8 AM EDT THIS MORNING THROUGH THIS EVENING"], "VTEC": ["/O.CON.KMHX.BH.S.0038.260619T1200Z-260620T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 190753"], "eventEndingTime": ["2026-06-19T20:00:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.bf1d4663055233df93c26ffa6fbc15d2b3a43ed6.001.2", "identifier": "urn:oid:2.49.0.1.840.0.bf1d4663055233df93c26ffa6fbc15d2b3a43ed6.001.2", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-06-18T20:12:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-06-19T03:53:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-76.014183, 35.065948, -75.764067, 35.195766], "geometry": {"coordinates": [[[[-75.818108, 35.172529], [-75.818527, 35.172413], [-75.820755, 35.173214], [-75.818192, 35.173878], [-75.818108, 35.172529]]], [[[-75.805416, 35.183956], [-75.80748, 35.1843], [-75.807648, 35.18478], [-75.805499, 35.185032], [-75.805416, 35.183956]]], [[[-75.771937, 35.189974], [-75.773444, 35.189701], [-75.773636, 35.190342], [-75.772271, 35.190639], [-75.771937, 35.189974]]], [[[-75.764435, 35.190155], [-75.764825, 35.186262], [-75.768286, 35.18324], [-75.779251, 35.181137], [-75.812222, 35.169321], [-75.864366, 35.148834], [-75.922039, 35.1233 87], [-75.505374, 35.716126]]]], "type": "MultiPolygon"}, "id": "4", "properties": {"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.e085345aabec311a54b62ce4229d7ee924a9c84a.001.1", "@type": "wx:Alert", "affectedZones": ["https://api.weather.gov/zones/forecast/NCZ195", "https://api.weather.gov/zones/forecast/NCZ196", "https://api.weather.gov/zones/forecast/NCZ199", "https://api.weather.gov/zones/forecast/NCZ204", "https://api.weather.gov/zones/forecast/NCZ205"], "areaDesc": "West Carteret; East Carteret; Coastal Onslow; Ocracoke Island; Hatteras Island", "category": "Marine/Beach", "certainty": "Likely", "code": "IPAWSv1.0", "description": "* WHAT...Dangerous rip currents, large breaking waves expected,\nand strong longshore currents in the surf zone.\n\n* WHERE...For the dangerous rip currents, large breaking waves,\nand strong longshore currents, the beaches from Cape Hatteras\nto Surf City. For the strong longshore currents, the beaches\nfrom Oregon Inlet to Cape Hatteras.\n\n* WHEN...From 8 AM EDT Friday through Friday evening.\n\n* IMPACTS...Rip currents can sweep even the best swimmers away\nfrom shore into deeper water. Dangerous shore break can throw\na swimmer or surfer head first into the bottom causing neck\nand back injuries. Strong longshore currents will create\ndangerous swimming conditions.\n\n* ADDITIONAL DETAILS...The most likely time for strong rip\ncurrents to occur is a couple hours either side of low tide,\nwhich will occur around 5:00 PM Friday.", "effective": "2026-06-19T03:53:00-04:00", "ends": "2026-06-19T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-06-19T16:00:00-04:00", "geocode": {"SAME": ["037031", "037133", "037095", "037055"], "UGC": ["NCZ195", "NCZ196", "NCZ199", "NCZ204", "NCZ205"]}, "headline": "Beach Hazards Statement issued June 19 at 3:53AM EDT until June 19 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.e085345aabec311a54b62ce4229d7ee924a9c84a.001.1", "instruction": "Life-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Update", "note": null, "onset": "2026-06-19T08:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT FROM 8 AM EDT THIS MORNING THROUGH THIS EVENING"], "VTEC": ["/O.CON.KMHX.BH.S.0038.260619T1200Z-260620T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 190753"], "eventEndingTime": ["2026-06-19T20:00:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.bf1d4663055233df93c26ffa6fbc15d2b3a43ed6.001.2", "identifier": "urn:oid:2.49.0.1.840.0.bf1d4663055233df93c26ffa6fbc15d2b3a43ed6.001.2", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-06-18T20:12:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-06-19T03:53:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-77.763375, 34.28545, -77.51825, 34.473228], "geometry": {"geometries": [{"coordinates": [[[[-77.726138, 34.289628], [-77.726746, 34.291115], [-77.7248
