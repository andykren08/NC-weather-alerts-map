", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-04-19T06:00:00-04:00", "geocode": {"SAME": ["037055"], "UGC": ["NCZ203", "NCZ205"]}, "headline": "Beach Hazards Statement issued April 18 at 7:58PM EDT until April 19 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.76dc8cfde770fab3924f64a49ceef4da587c53c6.002.1", "instruction": "Life-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nStrong longshore currents can sweep swimmers and surfers into rip\ncurrents, piers, jetties and other hazardous areas. In many\ncases, the longshore current is strong enough to prevent swimmers\nfrom being able to keep their feet on the bottom making it\ndifficult to return to shore.", "language": "en-US", "messageType": "Alert", "onset": "2026-04-19T08:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT IN EFFECT FROM SUNDAY MORNING THROUGH SUNDAY EVENING"], "VTEC": ["/O.NEW.KMHX.BH.S.0010.260419T1200Z-260420T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 182358"], "eventEndingTime": ["2026-04-19T20:00:00-04:00"]}, "references": [], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-04-18T19:58:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-75.867097, 36.221516, -75.393841, 36.552906], "geometry": {"coordinates": [[[-75.393841, 36.222162], [-75.768791, 36.221516], [-75.784401, 36.257996], [-75.815195, 36.345329], [-75.833557, 36.418369], [-75.856212, 36.495113], [-75.867097, 36.551006], [-75.530077, 36.552906], [-75.528415, 36.547132], [-75.528794, 36.540406], [-75.524713
