f Cape Hatteras.\n\n* WHEN...Through this evening.\n\n* IMPACTS...Rip currents can sweep even the best swimmers away\nfrom shore into deeper water. Dangerous shore break can throw\na swimmer or surfer head first into the bottom causing neck\nand back injuries.\n\n* ADDITIONAL DETAILS...The most likely time for strong rip\ncurrents to occur is a couple hours either side of low tide,\nwhich will occur around 2 pm.", "effective": "2026-05-31T03:00:00-04:00", "ends": "2026-05-31T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-05-31T20:00:00-04:00", "geocode": {"SAME": ["037055"], "UGC": ["NCZ203", "NCZ205"]}, "headline": "Beach Hazards Statement issued May 31 at 3:00AM EDT until May 31 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.8760d99e2f60bca6a041d8b411552a94b94771f9.001.1", "instruction": "Life-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.", "language": "en-US", "messageType": "Update", "note": null, "onset": "2026-05-31T03:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT NOW IN EFFECT THROUGH THIS EVENING"], "VTEC": ["/O.EXT.KMHX.BH.S.0025.260531T0700Z-260601T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 310700"], "eventEndingTime": ["2026-05-31T20:00:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.a683511513df54bc026cdb8fda09059f7ca58745.001.1", "identifier": "urn:oid:2.49.0.1.840.0.a683511513df54bc026cdb8fda09059f7ca58745
