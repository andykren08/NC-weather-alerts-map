0923be474c79996c2e03250b48ba55332f.001.2", "instruction": "Inexperienced swimmers should remain out of the water due to\ndangerous surf conditions.\n\nLife-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.", "language": "en-US", "messageType": "Update", "onset": "2026-04-09T07:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["HIGH SURF ADVISORY REMAINS IN EFFECT UNTIL 11 AM EDT THIS MORNING... ...BEACH HAZARDS STATEMENT REMAINS IN EFFECT THROUGH THIS EVENING"], "VTEC": ["/O.CON.KMHX.BH.S.0003.260409T1100Z-260410T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 090821"], "eventEndingTime": ["2026-04-09T20:00:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.16dfee93826f54dd9451db94b2f13321d0629eb6.001.1", "identifier": "urn:oid:2.49.0.1.840.0.16dfee93826f54dd9451db94b2f13321d0629eb6.001.1", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-04-08T20:36:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-04-09T04:21:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-75.76476, 35.190174, -75.4599941, 35.7748909], "geometry": {"coordinates": [[[[-75.760881, 35.203552], [-75.756946, 35.203046], [-75.759795, 35.200185], [-75.76476, 35.202019], [-75.760881, 35.203552]]], [[[-75.7179413, 35.2063293], [-75.7182361, 35.207544], [-75.7164695, 35.208919], [-75.716266, 35.208277], [-75.7179413, 35.2063 34], [-75.4982758, 35.7024765], [-75.4967561, 35.702041], [-75.4996231, 35.704834]], [[-75.5053231, 35.708477], [-75.5059967, 35.708889], [-75.5061941, 35.707355], [-75.5044531, 35.707652], [-75.5053231, 35.708477]], [[-75.5041961, 35.713698], [-75.5045624, 35.7144089], [-75.5052061, 35.714363], [-75.5052643, 35.7138138], [-75.5041961, 35.713698]], [[-75.5053741, 35.716126], [-75.5062441, 35.715966], [-75.5057068, 35.714798], [-75.5049251, 35.715187], [-75.5053741, 35.716126]]]], "type": "MultiPolygon"}, "id": "2", "properties": {"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.dc547e0923be474c79996c2e03250b48ba55332f.001.2", "@type": "wx:Alert", "affectedZones": ["https://api.weather.gov/zones/forecast/NCZ203", "https://api.weather.gov/zones/forecast/NCZ205"], "areaDesc": "Northern Outer Banks; Hatteras Island", "category": "Marine/Beach", "certainty": "Likely", "code": "IPAWSv1.0", "description": "* WHAT...For the High Surf Advisory, large breaking waves of 5 to\n8 feet in the surf zone. For the Beach Hazards Statement,\ndangerous rip currents and large breaking waves expected near\nthe shore.\n\n* WHERE...The beaches north of Cape Hatteras.\n\n* WHEN...For the High Surf Advisory, until 11 AM EDT this\nmorning. For the Beach Hazards Statement, through this evening.\n\n* IMPACTS...Dangerous swimming and surfing conditions and\nlocalized beach erosion. Rip currents can sweep even the best\nswimmers away from shore into deeper water. Dangerous shore\nbreak can throw a swimmer or surfer head first into the bottom\ncausing neck and back injuries.\n\n* ADDITIONAL DETAILS...The most likely time for strong rip\ncurrents to occur is a couple hours either side of low tide,\nwhich will occur around 7:30 AM.", "effective": "2026-04-09T04:21:00-04:00", "ends": "2026-04-09T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-04-09T16:30:00-04:00", "geocode": {"SAME": ["037055"], "UGC": ["NCZ203", "NCZ205"]}, "headline": "Beach Hazards Statement issued April 9 at 4:21AM EDT until April 9 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.dc547e0923be474c79996c2e03250b48ba55332f.001.2", "instruction": "Inexperienced swimmers should remain out of the water due to\ndangerous surf conditions.\n\nLife-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.", "language": "en-US", "messageType": "Update", "onset": "2026-04-09T07:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["HIGH SURF ADVISORY REMAINS IN EFFECT UNTIL 11 AM EDT THIS MORNING... ...BEACH HAZARDS STATEMENT REMAINS IN EFFECT THROUGH THIS EVENING"], "VTEC": ["/O.CON.KMHX.BH.S.0003.260409T1100Z-260410T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 090821"], "eventEndingTime": ["2026-04-09T20:00:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.16dfee93826f54dd9451db94b2f13321d0629eb6.001.1", "identifier": "urn:oid:2.49.0.1.840.0.16dfee93826f54dd9451db94b2f13321d0629eb6.001.1", "sender": "w-nws.webmaster@noaa.gov", "sent": "2026-04-08T20:36:00-04:00"}], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-04-09T04:21:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "web": "http://www.weather.gov"}, "type": "Feature"}, {"bbox": [-76.69115299999956, 34.581570899999946, -76.01861899999948, 35.10626600000007], "geometry": {"coordinates": [[[[-76.5277634, 34.6338584], [-7
