ches north of Cape Hatteras.\n\n* WHEN...Until 8 PM EDT this evening.\n\n* IMPACTS...Rip currents can sweep even the best swimmers away\nfrom shore into deeper water. Dangerous shore break can throw\na swimmer or surfer head first into the bottom causing neck\nand back injuries.", "effective": "2026-04-10T10:54:00-04:00", "ends": "2026-04-10T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-04-10T20:00:00-04:00", "geocode": {"SAME": ["037055"], "UGC": ["NCZ203", "NCZ205"]}, "headline": "Beach Hazards Statement issued April 10 at 10:54AM EDT until April 10 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.aa7152061d472424ee38f6227a3eb7efef382808.002.1", "instruction": "Life-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.\n\nShore break occurs when waves break directly on the beach. It is\nextremely important to protect your head and neck whenever you\nare in breaking waves by keeping your hands in front of you at\nall times.", "language": "en-US", "messageType": "Update", "onset": "2026-04-10T10:54:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT REMAINS IN EFFECT UNTIL 8 PM EDT THIS EVENING"], "VTEC": ["/O.CON.KMHX.BH.S.0004.000000T0000Z-260411T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 101454"], "eventEndingTime": ["2026-04-10T20:00:00-04:00"], "expiredReferences": ["w-nws.webmaster@noaa.gov,urn:oid:2.49.0.1.840.0.55214319166ddeefc92f3f54bfe7db52b7d43359.002.2,2026-04-09T20:13:00-04:00"]}, "references": [{"@id": "https://api.weather.gov/alerts/urn:oid:2.49.0.1.840.0.3fd1a8ec009e0f1a25d0ff83d88264da8c95f4cf.003.1", "identifier": "urn:oid:2.49.0.1.840.0.3fd1a8ec009e0f1a25d0ff83d88
