es/forecast/NCZ205"], "areaDesc": "Northern Outer Banks; Hatteras Island", "category": "Marine/Beach", "certainty": "Likely", "code": "IPAWSv1.0", "description": "* WHAT...Dangerous rip currents.\n\n* WHERE...The beaches north of Cape Hatteras.\n\n* WHEN...From 8 AM EDT Sunday through Sunday evening.\n\n* IMPACTS...Rip currents can sweep even the best swimmers away\nfrom shore into deeper water.\n\n* ADDITIONAL DETAILS...The most likely time for strong rip\ncurrents to occur is a couple hours either side of low tide,\nwhich will occur around 3:00 PM Sunday.", "effective": "2026-05-02T20:04:00-04:00", "ends": "2026-05-03T20:00:00-04:00", "event": "Beach Hazards Statement", "eventCode": {"NationalWeatherService": ["BHS"], "SAME": ["NWS"]}, "expires": "2026-05-03T08:15:00-04:00", "geocode": {"SAME": ["037055"], "UGC": ["NCZ203", "NCZ205"]}, "headline": "Beach Hazards Statement issued May 2 at 8:04PM EDT until May 3 at 8:00PM EDT by NWS Newport/Morehead City NC", "id": "urn:oid:2.49.0.1.840.0.2d0684845cf6cf2504df6c200368d8e823446131.001.2", "instruction": "Life-threatening rip currents. If caught in a rip current, remain\ncalm. Swim in a direction following the shoreline. If tired,\nfloat or tread water until out of the rip current. If unable to\nescape, face the shore and call or wave for help.", "language": "en-US", "messageType": "Alert", "note": null, "onset": "2026-05-03T08:00:00-04:00", "parameters": {"AWIPSidentifier": ["CFWMHX"], "BLOCKCHANNEL": ["EAS", "NWEM", "CMAS"], "NWSheadline": ["BEACH HAZARDS STATEMENT IN EFFECT THROUGH SUNDAY EVENING NORTH OF CAPE HATTERAS"], "VTEC": ["/O.NEW.KMHX.BH.S.0018.260503T1200Z-260504T0000Z/"], "WMOidentifier": ["WHUS42 KMHX 030004"], "eventEndingTime": ["2026-05-03T20:00:00-04:00"]}, "references": [], "response": "Avoid", "scope": "Public", "sender": "w-nws.webmaster@noaa.gov", "senderName": "NWS Newport/Morehead City NC", "sent": "2026-05-02T20:04:00-04:00", "severity": "Moderate", "status": "Actual", "urgency": "Expected", "
